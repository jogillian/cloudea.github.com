<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Co-Parent Expense Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdf6d8;
      --card: #ffffff;
      --border: #ddd89a;
      --text: #2a2a2a;
      --muted: #6b7a6b;
      --accent: #5cb7a4;
      --accent-dark: #4a9d8b;
      --green: #5cb7a4;
      --soft-mint: #a1d1b1;
      --red: #e86f43;
      --yellow: #eeab44;
      --radius: 10px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    header {
      background: var(--accent);
      border-bottom: none;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 12px rgba(92,183,164,0.3);
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.3px;
    }

    header h1 span {
      color: var(--bg);
    }

    .settings-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      color: #ffffff;
    }
    .settings-btn:hover { background: rgba(255,255,255,0.3); }

    .container { max-width: 680px; margin: 0 auto; padding: 20px 16px; }

    #settings-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      display: none;
      box-shadow: var(--shadow);
    }
    #settings-panel h2 { font-size: 0.95rem; font-weight: 700; margin-bottom: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .balance-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px 20px;
      margin-bottom: 20px;
      text-align: center;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .balance-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 8px; }
    .balance-amount { font-size: 2.6rem; font-weight: 800; letter-spacing: -1px; }
    .balance-amount.owe { color: var(--red); }
    .balance-amount.owed { color: var(--green); }
    .balance-amount.even { color: var(--muted); }
    .balance-description { font-size: 0.9rem; color: var(--muted); margin-top: 6px; }
    .balance-meta { display: flex; justify-content: center; gap: 24px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
    .balance-meta-item { text-align: center; }
    .balance-meta-item .val { font-size: 1.05rem; font-weight: 700; }
    .balance-meta-item .lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; }

    .add-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .add-card h2 { font-size: 0.95rem; font-weight: 700; margin-bottom: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    .form-group { flex: 1 1 140px; display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .form-group input, .form-group select {
      padding: 9px 11px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--bg);
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); background: #fff; }

    .btn-primary {
      width: 100%;
      margin-top: 4px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--accent-dark); }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .list-header h2 { font-size: 0.95rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .export-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      white-space: nowrap;
    }
    .export-btn:hover { background: var(--yellow); color: #2a2a2a; border-color: var(--yellow); }
    .filter-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      color: var(--muted);
      font-weight: 500;
    }
    .filter-btn.active { background: var(--yellow); color: #2a2a2a; border-color: var(--yellow); }

    .expense-item {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: var(--shadow);
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

    .expense-kid-badge {
      min-width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .expense-body { flex: 1; min-width: 0; }
    .expense-desc { font-weight: 600; font-size: 0.92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .expense-meta { font-size: 0.77rem; color: var(--muted); margin-top: 2px; }
    .expense-meta strong { color: var(--text); }

    .expense-right { text-align: right; flex-shrink: 0; }
    .expense-amount { font-size: 1.05rem; font-weight: 700; }
    .expense-owed { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }
    .paid-by-me { color: var(--green); }
    .paid-by-other { color: var(--red); }

    .payment-item {
      background: #eaf6f1;
      border-radius: var(--radius);
      border: 1px solid var(--soft-mint);
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
      animation: fadeIn 0.2s ease;
    }
    .payment-badge {
      min-width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--green);
      color: #fff;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .payment-body { flex: 1; min-width: 0; }
    .payment-desc { font-weight: 600; font-size: 0.92rem; color: var(--green); }
    .payment-meta { font-size: 0.77rem; color: var(--muted); margin-top: 2px; }
    .payment-amount { font-size: 1.05rem; font-weight: 700; color: var(--green); text-align: right; flex-shrink: 0; }

    .delete-btn {
      background: none;
      border: none;
      color: var(--border);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      border-radius: 4px;
      line-height: 1;
      align-self: center;
      flex-shrink: 0;
    }
    .delete-btn:hover { color: var(--red); background: #fff0f0; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

    .settings-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    .settings-grid .form-group { flex: 1 1 160px; }
    .btn-save {
      background: var(--yellow);
      color: #2a2a2a;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-save:hover { opacity: 0.9; }
    .btn-danger {
      background: none;
      border: 1px solid var(--red);
      color: var(--red);
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      margin-left: 8px;
    }
    .btn-danger:hover { background: #fff0f0; }
    .settings-actions { margin-top: 14px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2a2a2a;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      transition: transform 0.25s ease;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .balance-amount { font-size: 2rem; }
      .form-group { flex: 1 1 100%; }
    }
  </style>
</head>
<body>

<header>
  <h1><span>Co-Parent</span> Expenses</h1>
  <button class="settings-btn" onclick="toggleSettings()">&#9881; Settings</button>
</header>

<div class="container">

  <div id="settings-panel">
    <h2>Setup</h2>
    <div class="settings-grid">
      <div class="form-group">
        <label>Your Name</label>
        <input id="s-my-name" type="text" placeholder="e.g. Mom" />
      </div>
      <div class="form-group">
        <label>Co-Parent Name</label>
        <input id="s-other-name" type="text" placeholder="e.g. Dad" />
      </div>
      <div class="form-group" style="flex: 1 1 100%;">
        <label>Kids (comma-separated)</label>
        <input id="s-kids" type="text" placeholder="e.g. Emma, Jack, Lily" />
      </div>
    </div>
    <div class="settings-actions">
      <button class="btn-save" onclick="saveSettings()">Save Settings</button>
      <button class="btn-danger" onclick="clearAllData()">Clear All Data</button>
    </div>
  </div>

  <div class="balance-card">
    <div class="balance-label">Current Balance</div>
    <div id="balance-amount" class="balance-amount even">$0.00</div>
    <div id="balance-description" class="balance-description">All settled up!</div>
    <div class="balance-meta">
      <div class="balance-meta-item">
        <div class="val" id="meta-my-total">$0.00</div>
        <div class="lbl" id="meta-my-label">You paid</div>
      </div>
      <div class="balance-meta-item">
        <div class="val" id="meta-other-total">$0.00</div>
        <div class="lbl" id="meta-other-label">They paid</div>
      </div>
      <div class="balance-meta-item">
        <div class="val" id="meta-total">$0.00</div>
        <div class="lbl">Total expenses</div>
      </div>
    </div>
  </div>

  <div class="add-card">
    <h2>Add Expense</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Kid</label>
        <select id="f-kid"></select>
      </div>
      <div class="form-group">
        <label>Paid By</label>
        <select id="f-paid-by"></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex: 2 1 200px;">
        <label>Description</label>
        <input id="f-desc" type="text" placeholder="e.g. Soccer cleats" />
      </div>
      <div class="form-group" style="flex: 1 1 100px;">
        <label>Amount ($)</label>
        <input id="f-amount" type="number" min="0" step="0.01" placeholder="0.00" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input id="f-date" type="date" />
      </div>
    </div>
    <button class="btn-primary" onclick="addExpense()">+ Add Expense</button>
  </div>

  <div class="add-card" style="border-color: var(--soft-mint);">
    <h2 style="color: var(--accent);">Record a Payment</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Who Paid?</label>
        <select id="p-paid-by">
          <option value="me">I paid them</option>
          <option value="other">They paid me</option>
        </select>
      </div>
      <div class="form-group">
        <label>Amount ($)</label>
        <input id="p-amount" type="number" min="0" step="0.01" placeholder="0.00" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input id="p-date" type="date" />
      </div>
      <div class="form-group">
        <label>Note (optional)</label>
        <input id="p-note" type="text" placeholder="e.g. e-transfer" />
      </div>
    </div>
    <button class="btn-primary" style="background: var(--yellow); color: #2a2a2a;" onclick="addPayment()">&#10003; Record Payment</button>
  </div>

  <div class="list-header">
    <h2>Expenses &amp; Payments</h2>
    <button class="export-btn" onclick="exportCSV()" title="Download as CSV / open in Google Sheets">&#11123; Export CSV</button>
  </div>
  <div class="filter-row" id="kid-filters"></div>
  <div id="expense-list"></div>

</div>

<div class="toast" id="toast"></div>

<script>
  let settings = { myName: 'Me', otherName: 'Co-Parent', kids: ['Child'] };
  let expenses = [];
  let payments = [];
  let activeFilter = 'all';

  function init() {
    const savedSettings = localStorage.getItem('cp_settings');
    const savedExpenses = localStorage.getItem('cp_expenses');
    const savedPayments = localStorage.getItem('cp_payments');
    if (savedSettings) settings = JSON.parse(savedSettings);
    if (savedExpenses) expenses = JSON.parse(savedExpenses);
    if (savedPayments) payments = JSON.parse(savedPayments);
    renderAll();
  }

  function save() {
    localStorage.setItem('cp_settings', JSON.stringify(settings));
    localStorage.setItem('cp_expenses', JSON.stringify(expenses));
    localStorage.setItem('cp_payments', JSON.stringify(payments));
  }

  function toggleSettings() {
    const panel = document.getElementById('settings-panel');
    const open = panel.style.display === 'block';
    if (!open) {
      document.getElementById('s-my-name').value = settings.myName;
      document.getElementById('s-other-name').value = settings.otherName;
      document.getElementById('s-kids').value = settings.kids.join(', ');
    }
    panel.style.display = open ? 'none' : 'block';
  }

  function saveSettings() {
    const myName = document.getElementById('s-my-name').value.trim() || 'Me';
    const otherName = document.getElementById('s-other-name').value.trim() || 'Co-Parent';
    const kidsRaw = document.getElementById('s-kids').value.trim();
    const kids = kidsRaw ? kidsRaw.split(',').map(k => k.trim()).filter(Boolean) : ['Child'];
    settings = { myName, otherName, kids };
    save();
    renderAll();
    document.getElementById('settings-panel').style.display = 'none';
    showToast('Settings saved');
  }

  function clearAllData() {
    if (!confirm('Delete all expenses and payments? This cannot be undone.')) return;
    expenses = [];
    payments = [];
    save();
    renderAll();
    showToast('All data cleared');
  }

  function addPayment() {
    const paidBy = document.getElementById('p-paid-by').value;
    const amount = parseFloat(document.getElementById('p-amount').value);
    const date = document.getElementById('p-date').value;
    const note = document.getElementById('p-note').value.trim();
    if (!amount || amount <= 0) { showToast('Please enter a valid amount'); return; }
    if (!date) { showToast('Please pick a date'); return; }
    payments.unshift({ id: Date.now(), paidBy, amount, date, note });
    save();
    document.getElementById('p-amount').value = '';
    document.getElementById('p-note').value = '';
    renderAll();
    showToast('Payment recorded');
  }

  function deletePayment(id) {
    if (!confirm('Remove this payment?')) return;
    payments = payments.filter(p => p.id !== id);
    save();
    renderAll();
    showToast('Payment removed');
  }

  function addExpense() {
    const kid = document.getElementById('f-kid').value;
    const paidBy = document.getElementById('f-paid-by').value;
    const desc = document.getElementById('f-desc').value.trim();
    const amount = parseFloat(document.getElementById('f-amount').value);
    const date = document.getElementById('f-date').value;
    if (!desc) { showToast('Please enter a description'); return; }
    if (!amount || amount <= 0) { showToast('Please enter a valid amount'); return; }
    if (!date) { showToast('Please pick a date'); return; }
    expenses.unshift({ id: Date.now(), kid, paidBy, desc, amount, date });
    save();
    document.getElementById('f-desc').value = '';
    document.getElementById('f-amount').value = '';
    renderAll();
    showToast('Expense added');
  }

  function deleteExpense(id) {
    if (!confirm('Remove this expense?')) return;
    expenses = expenses.filter(e => e.id !== id);
    save();
    renderAll();
    showToast('Expense removed');
  }

  function renderAll() {
    renderDropdowns();
    renderFilters();
    renderBalance();
    renderList();
  }

  function renderDropdowns() {
    const kidSel = document.getElementById('f-kid');
    const current = kidSel.value;
    kidSel.innerHTML = settings.kids.map(k => `<option value="${esc(k)}">${esc(k)}</option>`).join('');
    if (current && settings.kids.includes(current)) kidSel.value = current;
    const paidSel = document.getElementById('f-paid-by');
    const currentPaid = paidSel.value;
    paidSel.innerHTML = `<option value="me">${esc(settings.myName)}</option><option value="other">${esc(settings.otherName)}</option>`;
    if (currentPaid) paidSel.value = currentPaid;
  }

  function renderFilters() {
    const container = document.getElementById('kid-filters');
    const kids = [...new Set(expenses.map(e => e.kid))];
    let html = `<button class="filter-btn ${activeFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</button>`;
    kids.forEach(k => {
      html += `<button class="filter-btn ${activeFilter === k ? 'active' : ''}" onclick="setFilter('${esc(k)}')">${esc(k)}</button>`;
    });
    container.innerHTML = html;
  }

  function setFilter(val) {
    activeFilter = val;
    renderFilters();
    renderList();
  }

  function renderBalance() {
    const filtered = activeFilter === 'all' ? expenses : expenses.filter(e => e.kid === activeFilter);
    let myPaid = 0, otherPaid = 0;
    filtered.forEach(e => {
      if (e.paidBy === 'me') myPaid += e.amount;
      else otherPaid += e.amount;
    });
    const total = myPaid + otherPaid;
    let net = myPaid - total / 2;
    if (activeFilter === 'all') {
      payments.forEach(p => {
        if (p.paidBy === 'me') net += p.amount;
        else net -= p.amount;
      });
    }
    const amountEl = document.getElementById('balance-amount');
    const descEl = document.getElementById('balance-description');
    amountEl.className = 'balance-amount';
    if (Math.abs(net) < 0.01) {
      amountEl.textContent = '$0.00';
      amountEl.classList.add('even');
      descEl.textContent = 'All settled up!';
    } else if (net > 0) {
      amountEl.textContent = fmt(net);
      amountEl.classList.add('owed');
      descEl.textContent = `${settings.otherName} owes you ${fmt(net)}`;
    } else {
      amountEl.textContent = fmt(Math.abs(net));
      amountEl.classList.add('owe');
      descEl.textContent = `You owe ${settings.otherName} ${fmt(Math.abs(net))}`;
    }
    document.getElementById('meta-my-total').textContent = fmt(myPaid);
    document.getElementById('meta-my-label').textContent = `${settings.myName} paid`;
    document.getElementById('meta-other-total').textContent = fmt(otherPaid);
    document.getElementById('meta-other-label').textContent = `${settings.otherName} paid`;
    document.getElementById('meta-total').textContent = fmt(total);
  }

  function renderList() {
    const container = document.getElementById('expense-list');
    const filteredExpenses = activeFilter === 'all' ? expenses : expenses.filter(e => e.kid === activeFilter);
    const items = filteredExpenses.map(e => ({ ...e, _type: 'expense' }));
    if (activeFilter === 'all') {
      payments.forEach(p => items.push({ ...p, _type: 'payment' }));
    }
    items.sort((a, b) => b.id - a.id);
    if (items.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="icon">&#128203;</div>No expenses yet. Add one above!</div>`;
      return;
    }
    container.innerHTML = items.map(item => {
      if (item._type === 'payment') {
        const byMe = item.paidBy === 'me';
        const label = byMe ? `You paid ${settings.otherName}` : `${settings.otherName} paid you`;
        const note = item.note ? ` &middot; ${esc(item.note)}` : '';
        return `
          <div class="payment-item">
            <div class="payment-badge">&#10003;</div>
            <div class="payment-body">
              <div class="payment-desc">${label}</div>
              <div class="payment-meta">${formatDate(item.date)}${note}</div>
            </div>
            <div class="payment-amount">${fmt(item.amount)}</div>
            <button class="delete-btn" onclick="deletePayment(${item.id})" title="Remove">&#10005;</button>
          </div>`;
      }
      const byMe = item.paidBy === 'me';
      const paidName = byMe ? settings.myName : settings.otherName;
      const owedName = byMe ? settings.otherName : settings.myName;
      const colorClass = byMe ? 'paid-by-me' : 'paid-by-other';
      const initials = kidInitials(item.kid);
      const half = fmt(item.amount / 2);
      return `
        <div class="expense-item">
          <div class="expense-kid-badge" style="background:${kidColor(item.kid)}">${initials}</div>
          <div class="expense-body">
            <div class="expense-desc">${esc(item.desc)}</div>
            <div class="expense-meta"><strong>${esc(item.kid)}</strong> &middot; ${formatDate(item.date)} &middot; <span class="${colorClass}">Paid by ${esc(paidName)}</span></div>
          </div>
          <div class="expense-right">
            <div class="expense-amount">${fmt(item.amount)}</div>
            <div class="expense-owed">${esc(owedName)} owes ${half}</div>
          </div>
          <button class="delete-btn" onclick="deleteExpense(${item.id})" title="Remove">&#10005;</button>
        </div>`;
    }).join('');
  }

  function exportCSV() {
    if (expenses.length === 0 && payments.length === 0) {
      showToast('Nothing to export yet');
      return;
    }
    const q = s => `"${String(s).replace(/"/g, '""')}"`;
    const allRows = [];
    expenses.forEach(e => {
      const paidName = e.paidBy === 'me' ? settings.myName : settings.otherName;
      const owedName = e.paidBy === 'me' ? settings.otherName : settings.myName;
      allRows.push({ date: e.date, id: e.id, cols: [
        q('Expense'), q(e.date), q(e.kid), q(e.desc),
        e.amount.toFixed(2), q(paidName), (e.amount / 2).toFixed(2), q(owedName + ' owes half'), q('')
      ]});
    });
    payments.forEach(p => {
      const fromName = p.paidBy === 'me' ? settings.myName : settings.otherName;
      const toName   = p.paidBy === 'me' ? settings.otherName : settings.myName;
      const desc = `${fromName} paid ${toName}${p.note ? ' (' + p.note + ')' : ''}`;
      allRows.push({ date: p.date, id: p.id, cols: [
        q('Payment'), q(p.date), q(''), q(desc),
        p.amount.toFixed(2), q(fromName), q(''), q('Settlement payment'), q(p.note || '')
      ]});
    });
    allRows.sort((a, b) => a.date < b.date ? -1 : a.date > b.date ? 1 : a.id - b.id);
    let myPaid = 0, otherPaid = 0;
    expenses.forEach(e => { if (e.paidBy === 'me') myPaid += e.amount; else otherPaid += e.amount; });
    const total = myPaid + otherPaid;
    let net = myPaid - total / 2;
    payments.forEach(p => { if (p.paidBy === 'me') net += p.amount; else net -= p.amount; });
    const balanceDesc = Math.abs(net) < 0.01 ? 'All settled up'
      : net > 0 ? `${settings.otherName} owes ${settings.myName} $${net.toFixed(2)}`
      : `${settings.myName} owes ${settings.otherName} $${Math.abs(net).toFixed(2)}`;
    const header = ['Type','Date','Kid','Description','Amount','Paid By','Half Owed','Notes','Payment Note'];
    const lines = [
      header.map(q).join(','),
      ...allRows.map(r => r.cols.join(',')),
      '',
      q('SUMMARY') + ',,,,,,,',
      q('Total expenses') + ',,,,,' + total.toFixed(2) + ',,,',
      q(settings.myName + ' paid') + ',,,,,' + myPaid.toFixed(2) + ',,,',
      q(settings.otherName + ' paid') + ',,,,,' + otherPaid.toFixed(2) + ',,,',
      q('Net balance') + ',' + q(balanceDesc) + ',,,,,,,',
    ];
    const csv = '﻿' + lines.join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `coparent-expenses-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('CSV downloaded!');
  }

  function fmt(n) { return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function kidInitials(kid) { return kid.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0,2); }

  const KID_COLORS = ['#5cb7a4','#eeab44','#e86f43','#a1d1b1','#4a9d8b','#d4891a'];
  const kidColorMap = {};
  function kidColor(kid) {
    if (!kidColorMap[kid]) {
      const idx = Object.keys(kidColorMap).length % KID_COLORS.length;
      kidColorMap[kid] = KID_COLORS[idx];
    }
    return kidColorMap[kid];
  }

  function formatDate(d) {
    if (!d) return '';
    const [y, m, day] = d.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(m)-1]} ${parseInt(day)}, ${y}`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  document.getElementById('f-date').valueAsDate = new Date();
  document.getElementById('p-date').valueAsDate = new Date();
  init();
</script>
</body>
</html>
